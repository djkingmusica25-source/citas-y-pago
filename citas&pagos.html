<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veterinaria La Hacienda | Aguachica, Cesar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    /* Estilos base */
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Poppins',sans-serif;color:#333;background:#fff;line-height:1.6}
    .container{max-width:1200px;margin:auto;padding:20px}
    .section-title{text-align:center;font-size:2.5rem;margin-bottom:30px;color:#123524}
    
    /* Botón WhatsApp Flotante */
    .wa-float{position:fixed;bottom:30px;right:30px;background:#25d366;color:#fff;padding:15px 25px;border-radius:50px;text-decoration:none;font-weight:600;box-shadow:0 4px 15px rgba(0,0,0,0.2);z-index:1000;transition:transform 0.3s}
    .wa-float:hover{transform:scale(1.05)}

    /* Formularios */
    .form-section{padding:80px 20px;background:#f8fafc}
    .form-box{max-width:600px;margin:0 auto;background:#fff;padding:40px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,0.08)}
    .form-group{margin-bottom:20px}
    label{display:block;margin-bottom:5px;font-weight:600;color:#123524}
    input, select, textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-family:inherit}
    .btn-action{display:block;width:100%;background:#ff6b57;color:#fff;padding:15px;border:none;border-radius:50px;font-weight:600;cursor:pointer;margin-top:20px;transition:0.2s}
    .btn-action:hover{background:#e95745}

    /* Métodos de Pago */
    .payment-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:30px;text-align:center}
    .pay-item{padding:20px;border:2px solid #123524;border-radius:12px;color:#123524;font-weight:700}

    @media(max-width:768px){.payment-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<a href="https://wa.me/573122388458" class="wa-float" target="_blank">💬 WhatsApp</a>

<section class="form-section" id="citas">
    <div class="form-box">
        <h2 class="section-title">Apartar Cita</h2>
        <form action="mailto:lahaciendaveterinaria@gmail.com" method="post" enctype="text/plain">
            <div class="form-group"><label>Nombre del Propietario</label><input type="text" name="propietario" required></div>
            <div class="form-group"><label>Nombre de la Mascota</label><input type="text" name="mascota" required></div>
            <div class="form-group"><label>Servicio</label>
                <select name="servicio">
                    <option>Consulta General</option>
                    <option>Vacunación</option>
                    <option>Urgencias</option>
                    <option>Control</option>
                </select>
            </div>
            <button type="submit" class="btn-action">Solicitar Cita</button>
        </form>
    </div>
</section>

<section class="container" id="pagos-quejas">
    <h2 class="section-title">Métodos de Pago</h2>
    <div class="payment-grid">
        <div class="pay-item">Tarjeta de Crédito</div>
        <div class="pay-item">Nequi</div>
        <div class="pay-item">Bancolombia</div>
    </div>

    <div class="form-box" style="margin-top:80px">
        <h2 class="section-title">¿Quejas o Reclamos?</h2>
        <p style="text-align:center;margin-bottom:20px">Tu opinión es vital para mejorar nuestra atención.</p>
        <form action="mailto:lahaciendaveterinaria@gmail.com" method="post" enctype="text/plain">
            <div class="form-group"><label>Asunto</label><input type="text" name="asunto"></div>
            <div class="form-group"><label>Comentario</label><textarea name="comentario" rows="4"></textarea></div>
            <button type="submit" class="btn-action" style="background:#123524">Enviar Reclamo</button>
        </form>
    </div>
</section>

</body>
</html>
